<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 결과 - Auto Analyzer v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0066FF;
            --secondary: #00C9A7;
            --dark: #0A0E27;
            --text: #E5E7EB;
            --text-muted: #9CA3AF;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #0066FF, #00C9A7);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 900;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #0066FF;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .section-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .score-display {
            text-align: center;
            padding: 40px;
        }
        
        .score-large {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #0066FF, #00C9A7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .score-group {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 30px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .score-value {
            font-size: 36px;
            font-weight: 800;
        }
        
        .score-value.convenience {
            color: #00C9A7;
        }
        
        .score-value.design {
            color: #9333EA;
        }
        
        .btn-download {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0 8px;
        }
        
        .btn-pdf {
            background: #ef4444;
            color: white;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }
        
        .btn-pdf:hover {
            background: #dc2626;
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
        }
        
        .btn-ppt {
            background: #f59e0b;
            color: white;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
        }
        
        .btn-ppt:hover {
            background: #d97706;
            box-shadow: 0 15px 40px rgba(245, 158, 11, 0.5);
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #0066FF;
            color: var(--text);
        }
        
        .section-title.convenience {
            border-bottom-color: #00C9A7;
            color: #00C9A7;
        }
        
        .section-title.design {
            border-bottom-color: #9333EA;
            color: #9333EA;
        }
        
        .item-card {
            border-left: 4px solid #6366f1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        
        .item-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 102, 255, 0.5);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            gap: 20px;
        }
        
        .item-title {
            font-weight: 700;
            color: var(--text);
            font-size: 18px;
            line-height: 1.4;
            flex: 1;
        }
        
        .item-score-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .item-score {
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
        }
        
        .btn-edit {
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
        }
        
        .btn-edit:hover {
            background: #0052CC;
            box-shadow: 0 6px 16px rgba(0, 102, 255, 0.5);
        }
        
        .info-box {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 500;
        }
        
        .info-box.description {
            background: rgba(0, 102, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }
        
        .info-box.reason {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }
        
        .info-box.criteria {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-box.diagnosis {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 2px solid;
        }
        
        .progress-bar {
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 12px;
        }
        
        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1f36 0%, #0d1117 100%);
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal-title {
            color: #0066FF;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            color: var(--text);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #0066FF;
            background: rgba(0, 102, 255, 0.05);
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        
        .btn-modal {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save {
            background: #0066FF;
            color: white;
        }
        
        .btn-save:hover {
            background: #0052CC;
        }
        
        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }
        
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .page-link {
            color: #0066FF;
            text-decoration: none;
            word-break: break-all;
        }
        
        .page-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-chart-line"></i>
                Auto Analyzer v3.0 - 분석 결과
            </h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">Nielsen 10대 원칙 기반 UIUX 정밀 분석</p>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-size: 1.2rem; color: var(--text-muted);">분석 결과를 불러오는 중...</p>
        </div>
        
        <div id="result" style="display: none;">
            <!-- 분석된 페이지 목록 -->
            <div id="analyzedPages"></div>
            
            <!-- 종합 점수 -->
            <div class="section-card">
                <div class="score-display">
                    <div style="font-size: 16px; color: var(--text-muted); margin-bottom: 15px; font-weight: 500;">종합 점수</div>
                    <div id="totalScore" class="score-large">0.00</div>
                    <div class="score-group">
                        <div class="score-item">
                            <div class="score-label">편의성</div>
                            <div id="convenienceScore" class="score-value convenience">0.00</div>
                        </div>
                        <div class="score-item">
                            <div class="score-label">디자인</div>
                            <div id="designScore" class="score-value design">0.00</div>
                        </div>
                    </div>
                    
                    <!-- 다운로드 버튼 -->
                    <div style="margin-top: 40px;">
                        <button id="downloadPdfBtn" class="btn-download btn-pdf">
                            <i class="fas fa-file-pdf"></i> PDF 다운로드
                        </button>
                        <button id="downloadPptBtn" class="btn-download btn-ppt">
                            <i class="fas fa-file-powerpoint"></i> PPT 다운로드
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 총평 -->
            <div id="summary"></div>
            
            <!-- 편의성 항목 -->
            <div class="section-card">
                <h2 class="section-title convenience">
                    <i class="fas fa-clipboard-check"></i> 편의성 항목 (37개)
                </h2>
                <div id="convenienceItems"></div>
            </div>
            
            <!-- 디자인 항목 -->
            <div class="section-card">
                <h2 class="section-title design">
                    <i class="fas fa-palette"></i> 디자인 항목 (5개)
                </h2>
                <div id="designItems"></div>
            </div>
        </div>
    </div>
    
    <!-- 점수 수정 모달 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">
                <i class="fas fa-edit"></i> 평가 항목 수정
            </h3>
            
            <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 25px;">
                <div id="modalItemName" style="color: var(--text); font-weight: 600; font-size: 1.05rem;"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-star" style="color: #FFD700;"></i> 점수 (0.0 ~ 5.0)
                </label>
                <input type="number" id="newScoreInput" class="form-input" min="0" max="5" step="0.1">
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-stethoscope" style="color: #00C9A7;"></i> 진단 내용
                </label>
                <textarea id="newDescriptionInput" class="form-textarea" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lightbulb" style="color: #f59e0b;"></i> 권장사항
                </label>
                <textarea id="newRecommendationInput" class="form-textarea" rows="3"></textarea>
            </div>
            
            <div class="modal-buttons">
                <button id="cancelBtn" class="btn-modal btn-cancel">취소</button>
                <button id="saveBtn" class="btn-modal btn-save">저장</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentData = null;
        let currentEditItem = null;
        
        // URL에서 filename 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const filename = urlParams.get('file');
        
        if (!filename) {
            document.getElementById('loading').innerHTML = `
                <div style="color: #ef4444; text-align: center;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 60px; margin-bottom: 20px;"></i>
                    <h2 style="font-size: 24px; margin-bottom: 10px;">파일명이 지정되지 않았습니다</h2>
                    <p>올바른 URL 형식: result.html?file=analysis-2026-03-06T00-00-00.json</p>
                </div>
            `;
        } else {
            loadResult(filename);
        }
        
        async function loadResult(filename) {
            try {
                const response = await fetch(`/api/latest`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error('분석 결과를 가져올 수 없습니다');
                }
                
                currentData = result.data;
                displayResult(currentData);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ef4444; text-align: center;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 60px; margin-bottom: 20px;"></i>
                        <h2 style="font-size: 24px; margin-bottom: 10px;">분석 결과를 불러올 수 없습니다</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function displayResult(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            // 종합 점수 표시
            displayScores(data);
            
            // 분석된 페이지 목록
            displayAnalyzedPages(data);
            
            // 총평
            displaySummary(data);
            
            // 편의성/디자인 항목
            displayItems(data);
        }
        
        function displayScores(data) {
            const overall = data.summary?.totalScore || data.totalScore || 0;
            document.getElementById('totalScore').textContent = overall.toFixed(2);
            
            // 편의성/디자인 점수는 v3에서는 아직 분리되지 않았으므로 임시로 같은 값 사용
            document.getElementById('convenienceScore').textContent = overall.toFixed(2);
            document.getElementById('designScore').textContent = overall.toFixed(2);
        }
        
        function displayAnalyzedPages(data) {
            // v3는 analyzed_pages가 없으므로 URL만 표시
            const html = `
                <div class="section-card">
                    <div style="font-weight: 700; color: var(--text); margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 24px;">📄</span> 분석된 페이지
                    </div>
                    <div style="font-size: 16px; color: #D1D5DB; line-height: 2;">
                        <div style="margin-bottom: 15px;">
                            <strong style="color: var(--text-muted); font-size: 14px;">메인 페이지</strong><br>
                            <a href="${data.url}" target="_blank" class="page-link">${data.url}</a>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('analyzedPages').innerHTML = html;
        }
        
        function displaySummary(data) {
            const grade = data.summary?.grade || data.grade || 'B';
            const breakdown = data.summary?.accuracyBreakdown || {};
            
            const html = `
                <div class="section-card">
                    <div style="font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 28px;">📋</span> 종합 평가 총평
                    </div>
                    <div style="font-size: 16px; color: #D1D5DB; line-height: 2; padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
                        <p>종합 점수 <strong style="color: #0066FF; font-size: 24px;">${(data.summary?.totalScore || data.totalScore || 0).toFixed(2)}/5.0</strong> (등급: <strong style="color: #0066FF;">${grade}</strong>)을 기록했습니다.</p>
                        <p style="margin: 10px 0;"><small>✅ 실제 브라우저 분석 + AI 정적 분석 통합 평가</small></p>
                        <p style="margin: 10px 0;"><small>※ 1,617개 국민평가 데이터 기반 정밀 진단</small></p>
                        
                        ${data.summary?.nationalComparison ? `
                        <div style="margin: 15px 0; padding: 15px; background: rgba(16, 185, 129, 0.1); border-left: 3px solid #10b981; border-radius: 8px;">
                            <strong>🎓 국민평가 비교 (49개 공공기관 기준):</strong><br>
                            • <strong>내 점수: ${data.summary.nationalComparison.yourScore}/5.0</strong><br>
                            • 국민평가 평균: ${data.summary.nationalComparison.nationalAverage}/5.0<br>
                            • 차이: ${data.summary.nationalComparison.difference > 0 ? '+' : ''}${data.summary.nationalComparison.difference}점<br>
                            • 상대적 위치: <strong>${data.summary.nationalComparison.percentile}</strong><br>
                            • ${data.summary.nationalComparison.message}
                        </div>
                        ` : ''}
                        
                        <br>
                        <div style="margin: 15px 0; padding: 15px; background: rgba(0, 102, 255, 0.05); border-left: 3px solid #0066FF; border-radius: 8px;">
                            <strong>📊 분석 방법:</strong><br>
                            • <strong>실제 브라우저 테스트: ${(breakdown.puppeteerMeasured || 0) + (breakdown.patternMatched || 0)}개</strong> (Puppeteer 인터랙션)<br>
                            • <strong>성능 측정: ${breakdown.lighthouseMeasured || 4}개</strong> (Puppeteer Performance API로 LCP/FID/CLS/TTI 실측, 정확도 95%+)<br>
                            • <strong>HTML 정적 분석: ${breakdown.htmlOnly || 0}개</strong> (구조/접근성, 정확도 75%)
                        </div>
                        <br>
                        <strong>우수:</strong> ${data.summary?.excellentCount || 0}개, <strong>양호:</strong> ${data.summary?.goodCount || 0}개, <strong>보통:</strong> ${data.summary?.fairCount || 0}개, <strong>미흡:</strong> ${data.summary?.poorCount || 0}개
                    </div>
                </div>
            `;
            document.getElementById('summary').innerHTML = html;
        }
        
        function displayItems(data) {
            // v3 JSON: scores 객체를 items 배열로 변환
            const items = [];
            
            // page_results에서 진단 결과 추출
            const diagnosisMap = {};
            if (data.details && data.details.page_results) {
                for (const page of data.details.page_results) {
                    for (const [itemId, result] of Object.entries(page.results || {})) {
                        const details = result.details || {};
                        // details 객체를 읽기 쉬운 문자열로 변환
                        let diagnosisText = '';
                        if (typeof details === 'string') {
                            diagnosisText = details;
                        } else if (details.error) {
                            diagnosisText = `⚠️ ${details.error}`;
                        } else {
                            const parts = [];
                            for (const [key, value] of Object.entries(details)) {
                                if (typeof value === 'boolean') {
                                    parts.push(`${key}: ${value ? '✅' : '❌'}`);
                                } else if (typeof value === 'number' || typeof value === 'string') {
                                    parts.push(`${key}: ${value}`);
                                }
                            }
                            diagnosisText = parts.join(', ') || '측정 완료';
                        }
                        diagnosisMap[itemId] = diagnosisText;
                    }
                }
            }
            
            // scores를 items 배열로 변환하고 진단 결과 추가
            if (data.scores) {
                for (const [itemId, scoreData] of Object.entries(data.scores)) {
                    // scoreData는 { score, name, description, why_important, evaluation_criteria, nationalComparison } 객체
                    const score = typeof scoreData === 'object' ? scoreData.score : scoreData;
                    items.push({
                        itemId: itemId,
                        score: score,
                        name: scoreData.name || itemId,
                        description: scoreData.description || '항목 설명 없음',
                        why_important: scoreData.why_important || '중요도 설명 없음',
                        evaluation_criteria: scoreData.evaluation_criteria || '평가 기준 없음',
                        nationalComparison: scoreData.nationalComparison || null,  // 국민평가 비교 추가
                        method: diagnosisMap[itemId] ? 'measured' : 'estimated',
                        accuracy: diagnosisMap[itemId] ? 95 : 75,
                        result: diagnosisMap[itemId] || '추정 점수 (HTML 분석 기반)'
                    });
                }
            }
            
            // 디자인 항목 정의 (사용자 지정 9개)
            const designItemIds = [
                'N4_1_visual_consistency',      // 시각적 일관성
                'N4_3_standard_compliance',     // 표준 준수
                'N6_2_recognition_cues',        // 인식 단서
                'N8_2_clean_interface',         // 깔끔한 인터페이스
                'N8_3_visual_hierarchy',        // 시각적 계층
                'N12_1_responsive_layout',      // 반응형 레이아웃
                'N12_2_touch_optimization',     // 터치 최적화
                'N14_1_color_contrast',         // 색상 대비
                'N20_branding'                  // 브랜딩
            ];
            
            // 편의성/디자인 분리 (정확한 ID 기준)
            const convenienceItems = items.filter(item => !designItemIds.includes(item.itemId));
            const designItems = items.filter(item => designItemIds.includes(item.itemId));
            
            const convenienceHTML = renderItems(convenienceItems, 'convenience');
            const designHTML = renderItems(designItems, 'design');
            
            document.getElementById('convenienceItems').innerHTML = convenienceHTML;
            document.getElementById('designItems').innerHTML = designHTML;
        }
        
        function renderItems(items, type) {
            return items.map((item, index) => {
                const itemId = `item-${type}-${index}`;
                const scoreColor = item.score >= 4.5 ? '#00C9A7' : item.score >= 3.5 ? '#0066FF' : item.score >= 2.5 ? '#f59e0b' : '#ef4444';
                const gradeName = item.score >= 4.5 ? '매우 우수' : item.score >= 4.0 ? '우수' : item.score >= 3.0 ? '양호' : item.score >= 2.0 ? '보통' : '미흡';
                
                return `
                    <div id="${itemId}" class="item-card" style="border-left-color: ${scoreColor};">
                        <div class="item-header">
                            <div style="flex: 1;">
                                <div class="item-title">${item.name || getItemName(item.itemId)}</div>
                                <div style="font-size: 13px; color: #0066FF; font-weight: 600; background: rgba(0, 102, 255, 0.1); padding: 4px 10px; border-radius: 6px; display: inline-block; margin-top: 8px;">
                                    ${item.method === 'measured' ? '실측' : '추정'} (${item.accuracy}% 정확도)
                                </div>
                            </div>
                            <div class="item-score-area">
                                <div style="text-align: right;">
                                    <div id="${itemId}-score" class="item-score" style="color: ${scoreColor};">${item.score.toFixed(1)}</div>
                                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600;">${gradeName}</div>
                                </div>
                                <button class="btn-edit" onclick="openEditModal('${itemId}', '${item.itemId}', '${item.name || getItemName(item.itemId)}', ${item.score})">
                                    ✏️ 수정
                                </button>
                            </div>
                        </div>
                        
                        <div class="info-box description">
                            <div>
                                📝 <strong style="color: #0066FF;">항목 설명:</strong> ${item.description || '항목 설명 없음'}
                            </div>
                        </div>
                        
                        <div class="info-box reason">
                            <div>
                                💡 <strong style="color: #f59e0b;">중요한 이유:</strong> ${item.why_important || '중요도 설명 없음'}
                            </div>
                        </div>
                        
                        <div class="info-box criteria">
                            <div>
                                🔍 <strong style="color: var(--text-muted);">평가 기준:</strong> ${item.evaluation_criteria || '평가 기준 없음'}
                            </div>
                        </div>
                        
                        <div id="${itemId}-diagnosis" class="info-box diagnosis" style="border-color: ${scoreColor}; background: ${item.score >= 4.0 ? 'rgba(0, 201, 167, 0.1)' : item.score >= 3.0 ? 'rgba(0, 102, 255, 0.1)' : 'rgba(239, 68, 68, 0.1)'};">
                            <div>
                                📊 <strong style="color: ${scoreColor};">진단 결과:</strong> ${item.result || '진단 정보 없음'}
                            </div>
                        </div>
                        
                        ${item.nationalComparison ? `
                        <div class="info-box" style="border-color: #8b5cf6; background: rgba(139, 92, 246, 0.05);">
                            <div style="color: #8b5cf6; font-weight: 700; margin-bottom: 8px;">
                                🏆 국민평가 데이터 비교 (1,617개 평가 기반)
                            </div>
                            <div style="margin-left: 24px; color: #333;">
                                • 내 점수: <strong style="color: ${scoreColor};">${item.score.toFixed(2)}</strong><br>
                                • 국민평가 평균: <strong style="color: #8b5cf6;">${item.nationalComparison.avgNationalScore}</strong><br>
                                • 차이: <strong style="color: ${item.nationalComparison.status === '우수' ? '#00C9A7' : '#ef4444'};">${item.nationalComparison.difference}점 (${item.nationalComparison.status})</strong><br>
                                • 관련 항목: ${item.nationalComparison.relatedQuestions.map(q => `<span style="background: rgba(139, 92, 246, 0.1); padding: 2px 8px; border-radius: 4px; font-size: 12px;">${q.question}: ${q.text}</span>`).join(' ')}<br>
                                <div style="margin-top: 8px; padding: 8px; background: ${item.nationalComparison.status === '우수' ? 'rgba(0, 201, 167, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-radius: 6px;">
                                    💬 ${item.nationalComparison.message}
                                </div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="progress-bar">
                            <div class="progress-fill" style="background: ${scoreColor}; width: ${(item.score/5)*100}%;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 항목 이름 매핑 (한글)
        function getItemName(itemId) {
            const names = {
                'N1_1': '시스템 상태 가시성',
                'N1_2': '피드백 타이밍',
                'N1_3': '액션 피드백',
                'N3_2': '비상 탈출',
                'N3_3': '유연한 네비게이션',
                'N4_1': '시각적 일관성',
                'N5_1': '입력 검증',
                'N6_1': '가시적 옵션',
                'N7_1': '단축키 지원',
                'N8_1': '필수 정보 표시',
                'N9_1': '오류 메시지 품질',
                'N10_1': '도움말 가시성',
                'N11_1': '검색 자동완성',
                'N12_1': '반응형 레이아웃',
                'N13': '콘텐츠 신선도',
                'N14_1': '색상 대비',
                'N15': '파일 다운로드',
                'N16': '폼 복잡도',
                'N17_1': 'LCP 성능',
                'N17_2': 'FID 응답성',
                'N17_3': 'CLS 안정성',
                'N17_4': 'TTI 상호작용'
            };
            return names[itemId] || itemId;
        }
        
        function getItemDescription(itemId) {
            return '이 항목은 사용자가 시스템의 현재 상태를 명확하게 인지할 수 있는지 평가합니다.';
        }
        
        function getItemReason(itemId) {
            return '사용자는 시스템이 무엇을 하고 있는지 항상 알아야 하며, 적절한 피드백을 통해 안심하고 작업을 진행할 수 있습니다.';
        }
        
        function getItemCriteria(itemId) {
            return '5.0: 완벽한 상태 표시, 4.0: 우수한 피드백, 3.0: 기본적 피드백, 2.0: 부족한 피드백, 1.0: 피드백 없음';
        }
        
        // 점수 수정 모달
        function openEditModal(itemId, itemIdValue, itemName, originalScore) {
            currentEditItem = { itemId, itemIdValue, itemName, originalScore };
            
            document.getElementById('modalItemName').textContent = itemName;
            document.getElementById('newScoreInput').value = originalScore.toFixed(1);
            document.getElementById('newDescriptionInput').value = '';
            document.getElementById('newRecommendationInput').value = '';
            
            document.getElementById('editModal').classList.add('show');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditItem = null;
        }
        
        function saveEditedScore() {
            if (!currentEditItem) return;
            
            const newScore = parseFloat(document.getElementById('newScoreInput').value);
            const newDescription = document.getElementById('newDescriptionInput').value;
            const newRecommendation = document.getElementById('newRecommendationInput').value;
            
            if (newScore < 0 || newScore > 5) {
                alert('점수는 0.0 ~ 5.0 사이여야 합니다.');
                return;
            }
            
            // 화면 업데이트
            const scoreElement = document.getElementById(`${currentEditItem.itemId}-score`);
            if (scoreElement) {
                const scoreColor = newScore >= 4.5 ? '#00C9A7' : newScore >= 3.5 ? '#0066FF' : newScore >= 2.5 ? '#f59e0b' : '#ef4444';
                scoreElement.textContent = newScore.toFixed(1);
                scoreElement.style.color = scoreColor;
                
                // 진단 결과 업데이트
                if (newDescription) {
                    const diagnosisElement = document.getElementById(`${currentEditItem.itemId}-diagnosis`);
                    if (diagnosisElement) {
                        diagnosisElement.querySelector('div').innerHTML = `📊 <strong style="color: ${scoreColor};">진단 결과:</strong> ${newDescription}`;
                        diagnosisElement.style.borderColor = scoreColor;
                        diagnosisElement.style.background = newScore >= 4.0 ? 'rgba(0, 201, 167, 0.1)' : newScore >= 3.0 ? 'rgba(0, 102, 255, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                    }
                }
            }
            
            // localStorage에 저장
            try {
                const savedData = JSON.parse(localStorage.getItem('editedScores') || '{}');
                savedData[currentEditItem.itemIdValue] = {
                    score: newScore,
                    description: newDescription,
                    recommendation: newRecommendation
                };
                localStorage.setItem('editedScores', JSON.stringify(savedData));
                console.log('✅ 수정된 점수 저장:', savedData);
            } catch (e) {
                console.error('❌ localStorage 저장 실패:', e);
            }
            
            // 평균 재계산
            recalculateScores();
            
            closeEditModal();
        }
        
        function recalculateScores() {
            // TODO: 전체 항목의 평균을 재계산하여 종합/편의성/디자인 점수 업데이트
            console.log('🔄 점수 재계산 중...');
        }
        
        // 이벤트 리스너
        document.getElementById('cancelBtn').addEventListener('click', closeEditModal);
        document.getElementById('saveBtn').addEventListener('click', saveEditedScore);
        
        // 모달 외부 클릭 시 닫기
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });
        
        // PDF 다운로드
        document.getElementById('downloadPdfBtn').addEventListener('click', () => {
            alert('PDF 다운로드 기능은 추후 구현 예정입니다.');
        });
        
        // PPT 다운로드
        document.getElementById('downloadPptBtn').addEventListener('click', () => {
            alert('PPT 다운로드 기능은 추후 구현 예정입니다.');
        });
    </script>
</body>
</html>
