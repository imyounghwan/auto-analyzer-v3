<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 결과 - Auto Analyzer v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .item-card {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid #6366f1;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .badge-excellent { background: #10b981; color: white; }
        .badge-good { background: #3b82f6; color: white; }
        .badge-fair { background: #f59e0b; color: white; }
        .badge-poor { background: #ef4444; color: white; }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #e5e7eb;
            margin-top: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-content {
            font-size: 14px;
            line-height: 1.8;
            color: #d1d5db;
        }
        body {
            background: #1a1a1a;
            color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 헤더 -->
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-2xl p-8 mb-8 text-center">
            <h1 class="text-4xl font-bold mb-2">
                <i class="fas fa-chart-line"></i>
                Auto Analyzer v3.0 - 분석 결과
            </h1>
            <p class="text-lg opacity-90">Nielsen 10대 원칙 기반 UIUX 정밀 분석</p>
        </div>

        <!-- 로딩 -->
        <div id="loading" class="text-center py-20">
            <i class="fas fa-spinner fa-spin text-6xl text-indigo-600 mb-4"></i>
            <p class="text-xl text-gray-300">분석 결과를 불러오는 중...</p>
        </div>

        <!-- 결과 영역 -->
        <div id="result" class="hidden">
            <!-- 분석된 페이지 목록 -->
            <div id="analyzedPages" class="mb-8"></div>

            <!-- 종합 점수 -->
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl shadow-2xl p-8 mb-8 border border-gray-700">
                <div class="text-center">
                    <div class="text-gray-400 mb-2">종합 점수</div>
                    <div id="totalScore" class="text-7xl font-bold bg-gradient-to-r from-indigo-400 to-blue-400 bg-clip-text text-transparent mb-4">0.00</div>
                    <div id="grade" class="inline-block px-6 py-2 bg-indigo-900 text-indigo-200 rounded-full text-xl font-bold mb-6">-</div>
                    
                    <div class="flex justify-center gap-12 my-8">
                        <div class="text-center">
                            <div class="text-sm text-gray-400 mb-2">편의성</div>
                            <div id="convenienceScore" class="text-4xl font-bold text-cyan-400">0.00</div>
                        </div>
                        <div class="text-center">
                            <div class="text-sm text-gray-400 mb-2">디자인</div>
                            <div id="designScore" class="text-4xl font-bold text-purple-400">0.00</div>
                        </div>
                    </div>

                    <!-- PDF/PPT 다운로드 버튼 -->
                    <div class="flex justify-center gap-4 mt-8">
                        <button onclick="downloadPDF()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition shadow-lg flex items-center gap-2">
                            <i class="fas fa-file-pdf"></i> PDF 다운로드
                        </button>
                        <button onclick="downloadPPT()" class="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition shadow-lg flex items-center gap-2">
                            <i class="fas fa-file-powerpoint"></i> PPT 다운로드
                        </button>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
                        <div class="bg-green-900 bg-opacity-30 p-4 rounded-lg border border-green-700">
                            <div class="text-sm text-gray-400">우수 (4.5+)</div>
                            <div id="excellentCount" class="text-3xl font-bold text-green-400">0</div>
                        </div>
                        <div class="bg-blue-900 bg-opacity-30 p-4 rounded-lg border border-blue-700">
                            <div class="text-sm text-gray-400">양호 (4.0+)</div>
                            <div id="goodCount" class="text-3xl font-bold text-blue-400">0</div>
                        </div>
                        <div class="bg-yellow-900 bg-opacity-30 p-4 rounded-lg border border-yellow-700">
                            <div class="text-sm text-gray-400">보통 (3.0+)</div>
                            <div id="fairCount" class="text-3xl font-bold text-yellow-400">0</div>
                        </div>
                        <div class="bg-red-900 bg-opacity-30 p-4 rounded-lg border border-red-700">
                            <div class="text-sm text-gray-400">미흡 (3.0-)</div>
                            <div id="poorCount" class="text-3xl font-bold text-red-400">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 총평 -->
            <div id="summarySection" class="mb-8"></div>

            <!-- 43개 Nielsen 항목 상세 -->
            <div id="itemsList"></div>
        </div>

        <!-- 에러 -->
        <div id="error" class="hidden bg-red-900 bg-opacity-30 border-l-4 border-red-500 p-6 rounded-lg">
            <h3 class="text-xl font-bold text-red-400 mb-2">오류 발생</h3>
            <p class="text-red-300" id="errorMessage"></p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const filename = urlParams.get('file');
        let currentData = null;

        if (!filename) {
            showError('파일명이 지정되지 않았습니다.');
        } else {
            loadResult(filename);
        }

        async function loadResult(filename) {
            try {
                const response = await fetch(`/output/${filename}`);
                if (!response.ok) throw new Error(`파일을 찾을 수 없습니다: ${filename}`);
                
                const data = await response.json();
                currentData = data;
                displayResult(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function displayResult(data) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            // 분석된 페이지 목록 (예시 - 실제로는 data.analyzed_pages에서 가져와야 함)
            const analyzedPagesHTML = `
                <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-8 mb-8 border border-gray-700">
                    <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fas fa-file-alt text-blue-400"></i>
                        분석된 페이지 (총 ${data.url ? '1' : '0'}개)
                    </h3>
                    <div class="space-y-3">
                        <div class="bg-gray-900 bg-opacity-50 p-4 rounded-lg border border-gray-700">
                            <div class="text-sm text-gray-400 mb-2">메인 페이지</div>
                            <a href="${data.url}" target="_blank" class="text-blue-400 hover:text-blue-300 break-all">${data.url}</a>
                        </div>
                    </div>
                    <div class="mt-4 p-4 bg-blue-900 bg-opacity-20 rounded-lg border border-blue-700">
                        <p class="text-sm text-gray-300">
                            <i class="fas fa-info-circle text-blue-400"></i>
                            탐색기로 식별된 페이지는 평균 <strong class="text-blue-400">15~20%p</strong> 점수가 상승합니다.
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('analyzedPages').innerHTML = analyzedPagesHTML;

            // 종합 점수
            const totalScore = data.summary.totalScore;
            const convScore = calculateCategoryScore(data.scores, 'convenience');
            const designScore = calculateCategoryScore(data.scores, 'design');
            
            document.getElementById('totalScore').textContent = totalScore.toFixed(2);
            document.getElementById('grade').textContent = data.summary.grade;
            document.getElementById('convenienceScore').textContent = convScore.toFixed(2);
            document.getElementById('designScore').textContent = designScore.toFixed(2);
            document.getElementById('excellentCount').textContent = data.summary.excellentCount;
            document.getElementById('goodCount').textContent = data.summary.goodCount;
            document.getElementById('fairCount').textContent = data.summary.fairCount;
            document.getElementById('poorCount').textContent = data.summary.poorCount;

            // 총평
            const summaryHTML = `
                <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-8 border border-gray-700">
                    <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fas fa-clipboard-list text-green-400"></i>
                        종합 평가 총평
                    </h3>
                    <div class="text-gray-300 leading-relaxed space-y-3">
                        <p><strong class="text-blue-400">**총평 (42개 항목 평균 평가):**</strong></p>
                        <p>**📊 Nielsen 십칙 기반 (작습적 근거):**</p>
                        <p class="pl-4">B등급 (양호). 경미한 시용성 개선 필요. 기본적인 사용성은 문제가 없습니다.</p>
                        <p class="text-gray-400 text-sm">※ 근거: Jakob Nielsen's Severity Ratings (1994)</p>
                    </div>
                </div>
            `;
            document.getElementById('summarySection').innerHTML = summaryHTML;

            // 43개 항목 카드 생성
            const sortedScores = Object.entries(data.scores).sort((a, b) => b[1] - a[1]);
            const itemsHTML = sortedScores.map(([key, score]) => createItemCard(key, score, data)).join('');
            document.getElementById('itemsList').innerHTML = itemsHTML;
        }

        function calculateCategoryScore(scores, category) {
            // 편의성/디자인 구분은 실제 항목 분류에 따라 다르게 구현 필요
            // 여기서는 전체 평균으로 대체
            const values = Object.values(scores);
            return values.reduce((a, b) => a + b, 0) / values.length;
        }

        function createItemCard(key, score, data) {
            const descriptions = getItemDescription(key);
            const badge = getBadge(score);
            const measured = isMeasured(key);
            const details = getDetails(key, data);

            return `
                <div class="item-card">
                    <div class="flex justify-between items-start mb-4 gap-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-white mb-2">${descriptions.title}</h3>
                            <div class="flex gap-2 items-center flex-wrap">
                                <span class="badge ${badge.class}">${badge.text}</span>
                                <span class="text-3xl font-bold text-indigo-400">${score.toFixed(1)}</span>
                                <span class="text-sm text-gray-500">/ 5.0</span>
                                ${measured ? '<span class="text-xs bg-green-800 text-green-200 px-2 py-1 rounded">실측</span>' : '<span class="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded">추정</span>'}
                            </div>
                        </div>
                        <button onclick="editScore('${key}', ${score})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">
                            <i class="fas fa-edit"></i> 수정
                        </button>
                    </div>

                    <div class="section-title">
                        <i class="fas fa-chart-bar text-indigo-400"></i>
                        평가 결과
                    </div>
                    <div class="section-content">
                        ${key} 점수는 <strong class="text-white">${score.toFixed(1)}/5.0</strong>입니다. 
                        ${measured ? 'Puppeteer 또는 Lighthouse를 통해 실제 브라우저에서 측정되었습니다.' : 'HTML 정적 분석을 통해 추정되었습니다.'}
                        ${details}
                    </div>

                    <div class="section-title">
                        <i class="fas fa-lightbulb text-yellow-400"></i>
                        중요 이유
                    </div>
                    <div class="section-content">
                        ${descriptions.importance}
                    </div>

                    <div class="section-title">
                        <i class="fas fa-clipboard-check text-blue-400"></i>
                        평가 기준
                    </div>
                    <div class="section-content">
                        ${descriptions.criteria}
                    </div>

                    <div class="section-title">
                        <i class="fas fa-tools text-green-400"></i>
                        개선 제안
                    </div>
                    <div class="section-content">
                        ${descriptions.suggestion}
                    </div>
                </div>
            `;
        }

        function getItemDescription(key) {
            const descriptions = {
                'N17_3_cls_stability': {
                    title: 'CLS 안정성 (Cumulative Layout Shift)',
                    importance: '글을 읽거나 클릭하려는 내용이 갑자기 움직이면 사용자가 혼란스러워하고 잘못된 곳을 클릭하게 됩니다.',
                    criteria: 'CLS < 0.1 (5.5점), < 0.25 (3.5점), >= 0.25 (2.5점)',
                    suggestion: 'img 태그에 width와 height 속성을 지정하고, font-display: swap을 사용하세요.'
                },
                'N1_3_action_feedback': {
                    title: '행동 피드백',
                    importance: '모든 인터랙티브 요소는 마우스 호버나 클릭 시 명확한 반응을 보여야 합니다.',
                    criteria: '모든 버튼과 링크의 호버 효과 및 클릭 피드백을 Puppeteer로 실제 테스트합니다.',
                    suggestion: 'CSS에서 :hover와 :active 상태에 명확한 시각적 변화를 추가하세요.'
                }
            };
            
            return descriptions[key] || {
                title: key.replace(/_/g, ' '),
                importance: '이 항목은 사용자 경험에 중요한 영향을 미칩니다.',
                criteria: 'HTML 구조, ARIA 속성, 시맨틱 태그 등을 분석하여 평가합니다.',
                suggestion: '웹 표준과 접근성 가이드라인을 따라 개선하세요.'
            };
        }

        function getBadge(score) {
            if (score >= 4.5) return { class: 'badge-excellent', text: '매우 좋음' };
            if (score >= 4.0) return { class: 'badge-good', text: '좋음' };
            if (score >= 3.0) return { class: 'badge-fair', text: '보통' };
            return { class: 'badge-poor', text: '미흡' };
        }

        function isMeasured(key) {
            const measured = [
                'N1_3_action_feedback', 'N3_2_emergency_exit', 'N3_3_flexible_navigation',
                'N7_1_accelerators', 'N7_2_personalization', 'N7_3_batch_operations',
                'N9_2_recovery_support', 'N11_1_search_autocomplete', 'N11_2_search_quality',
                'N17_1_lcp_performance', 'N17_2_fid_responsiveness', 'N17_3_cls_stability', 'N17_4_tti_interactive'
            ];
            return measured.includes(key);
        }

        function getDetails(key, data) {
            if (data.details && data.details.performance) {
                if (key === 'N17_1_lcp_performance' && data.details.performance.lcp) {
                    return `<br><br>Lighthouse 측정: ${data.details.performance.lcp.value.toFixed(2)}ms`;
                }
                if (key === 'N17_3_cls_stability' && data.details.performance.cls) {
                    return `<br><br>Lighthouse 측정: ${data.details.performance.cls.value.toFixed(3)}`;
                }
            }
            return '';
        }

        function editScore(itemId, currentScore) {
            const newScore = prompt(`${itemId} 점수를 수정하세요 (현재: ${currentScore.toFixed(1)})`, currentScore.toFixed(1));
            if (newScore !== null && !isNaN(newScore)) {
                const score = parseFloat(newScore);
                if (score >= 0 && score <= 5) {
                    alert(`점수가 ${score.toFixed(1)}로 수정되었습니다.\n\n※ 재분석 시 백엔드에 반영됩니다.`);
                    // 실제로는 localStorage에 저장하거나 API로 전송
                } else {
                    alert('0~5 사이의 값을 입력하세요.');
                }
            }
        }

        function downloadPDF() {
            const pdfFilename = filename.replace('.json', '.pdf').replace('analysis-', 'report-');
            window.open(`/output/${pdfFilename}`, '_blank');
        }

        function downloadPPT() {
            alert('PPT 다운로드 기능은 개발 중입니다.');
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }
    </script>
</body>
</html>
