<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>항목 상세 정보 테스트</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        .item-card { background: rgba(255,255,255,0.05); border-left: 4px solid #0066FF; border-radius: 16px; padding: 24px; margin: 20px 0; }
        .item-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .info-box { padding: 16px; border-radius: 12px; margin-bottom: 12px; font-size: 15px; line-height: 1.8; }
        .info-box.description { background: rgba(0, 102, 255, 0.05); border: 1px solid rgba(0, 102, 255, 0.1); }
        .info-box.reason { background: rgba(245, 158, 11, 0.05); border: 1px solid rgba(245, 158, 11, 0.1); }
        .info-box.criteria { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <h1>Nielsen 항목 상세 정보 테스트</h1>
    <div id="result"></div>
    <script>
        fetch('/output/analysis-2026-03-06T11-59-02.json')
            .then(r => r.json())
            .then(data => {
                const n1_1 = data.scores.N1_1_status_visibility;
                document.getElementById('result').innerHTML = \`
                    <div class="item-card">
                        <div class="item-title">\${n1_1.name} (점수: \${n1_1.score})</div>
                        <div class="info-box description">
                            📝 <strong style="color: #0066FF;">항목 설명:</strong> \${n1_1.description}
                        </div>
                        <div class="info-box reason">
                            💡 <strong style="color: #f59e0b;">중요한 이유:</strong> \${n1_1.why_important}
                        </div>
                        <div class="info-box criteria">
                            🔍 <strong style="color: #9CA3AF;">평가 기준:</strong> \${n1_1.evaluation_criteria}
                        </div>
                    </div>
                \`;
            });
    </script>
</body>
</html>
